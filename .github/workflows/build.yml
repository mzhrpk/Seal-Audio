          EOF

          cat > app/src/main/java/com/example/seal/ui/screens/SettingsScreen.kt << 'EOF'
          package com.example.seal.ui.screens
          import androidx.compose.foundation.layout.*
          import androidx.compose.material.icons.Icons
          import androidx.compose.material.icons.filled.ChevronRight
          import androidx.compose.material.icons.outlined.*
          import androidx.compose.material3.*
          import androidx.compose.runtime.Composable
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.unit.dp
          @Composable
          fun SettingsScreen() {
              Column(modifier = Modifier.fillMaxSize().padding(16.dp)) {
                  Text("Settings", style = MaterialTheme.typography.headlineMedium, color = MaterialTheme.colorScheme.onBackground, modifier = Modifier.padding(top = 24.dp, bottom = 16.dp))
                  Text("Storage", color = MaterialTheme.colorScheme.primary, modifier = Modifier.padding(vertical = 8.dp))
                  ListItem(
                      headlineContent = { Text("Download directory") },
                      supportingContent = { Text("Downloads/Seal") },
                      leadingContent = { Icon(Icons.Outlined.FolderOpen, null) },
                      colors = ListItemDefaults.colors(containerColor = MaterialTheme.colorScheme.background)
                  )
                  Text("About", color = MaterialTheme.colorScheme.primary, modifier = Modifier.padding(vertical = 8.dp))
                  ListItem(
                      headlineContent = { Text("Seal") },
                      supportingContent = { Text("v1.0.0 - Powered by yt-dlp") },
                      leadingContent = { Icon(Icons.Outlined.Info, null) },
                      colors = ListItemDefaults.colors(containerColor = MaterialTheme.colorScheme.background)
                  )
              }
          }
          EOF

      - name: Write DownloadSheet.kt
        run: |
          cat > app/src/main/java/com/example/seal/ui/components/DownloadSheet.kt << 'EOF'
          package com.example.seal.ui.components
          import androidx.compose.foundation.layout.*
          import androidx.compose.foundation.shape.RoundedCornerShape
          import androidx.compose.material.icons.Icons
          import androidx.compose.material.icons.filled.Audiotrack
          import androidx.compose.material.icons.filled.VideoFile
          import androidx.compose.material3.*
          import androidx.compose.runtime.*
          import androidx.compose.ui.Alignment
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.unit.dp

          enum class DownloadType { AUDIO, VIDEO }

          @OptIn(ExperimentalMaterial3Api::class)
          @Composable
          fun DownloadBottomSheet(url: String, onDismiss: () -> Unit, onDownload: (DownloadType) -> Unit) {
              var selected by remember { mutableStateOf<DownloadType?>(null) }
              val sheetState = rememberModalBottomSheetState(skipPartiallyExpanded = true)
              ModalBottomSheet(onDismissRequest = onDismiss, sheetState = sheetState, containerColor = MaterialTheme.colorScheme.surface) {
                  Column(modifier = Modifier.fillMaxWidth().padding(24.dp), horizontalAlignment = Alignment.CenterHorizontally) {
                      Text("Select Format", style = MaterialTheme.typography.titleLarge, fontWeight = FontWeight.Bold)
                      Spacer(modifier = Modifier.height(24.dp))
                      Row(modifier = Modifier.fillMaxWidth(), horizontalArrangement = Arrangement.spacedBy(12.dp)) {
                          Button(onClick = { selected = DownloadType.AUDIO }, modifier = Modifier.weight(1f), colors = ButtonDefaults.buttonColors(containerColor = if (selected == DownloadType.AUDIO) MaterialTheme.colorScheme.primary else MaterialTheme.colorScheme.surfaceVariant)) {
                              Text("Audio", color = if (selected == DownloadType.AUDIO) MaterialTheme.colorScheme.onPrimary else MaterialTheme.colorScheme.onSurface)
                          }
                          Button(onClick = { selected = DownloadType.VIDEO }, modifier = Modifier.weight(1f), colors = ButtonDefaults.buttonColors(containerColor = if (selected == DownloadType.VIDEO) MaterialTheme.colorScheme.primary else MaterialTheme.colorScheme.surfaceVariant)) {
                              Text("Video", color = if (selected == DownloadType.VIDEO) MaterialTheme.colorScheme.onPrimary else MaterialTheme.colorScheme.onSurface)
                          }
                      }
                      Spacer(modifier = Modifier.height(24.dp))
                      Button(onClick = { selected?.let { onDownload(it) } }, enabled = selected != null, modifier = Modifier.fillMaxWidth().height(52.dp)) {
                          Text("Confirm Download")
                      }
                  }
              }
          }
          EOF

      - name: Write gradle.properties
        run: |
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m
          android.useAndroidX=true
          kotlin.code.style=official
          android.nonTransitiveRClass=true
          org.gradle.parallel=true
          org.gradle.caching=true
          EOF

      - name: Set up Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          /tmp/gradle/gradle-8.7/bin/gradle wrapper --gradle-version 8.7 || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: seal-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
