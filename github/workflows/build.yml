name: Build Final APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with: {java-version: '17', distribution: 'temurin'}

      # هذه الخطوة هي التي تحل مشكلة الـ gradlew المفقود
      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Download yt-dlp binary
        run: |
          mkdir -p app/src/main/assets
          curl -L "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux_aarch64" -o app/src/main/assets/yt-dlp
          chmod +x app/src/main/assets/yt-dlp

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          
