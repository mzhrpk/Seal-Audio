name: Build Final APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Organize Project Structure
        run: |
          mkdir -p app/src/main/java/com/seal/app/ui/theme app/src/main/java/com/seal/app/ui/screens
          mkdir -p app/src/main/java/com/seal/app/ui/components app/src/main/java/com/seal/app/viewmodel
          mkdir -p app/src/main/java/com/seal/app/util app/src/main/assets app/src/main/res/values
          mv ui/* app/src/main/java/com/seal/app/ui/ || true
          mv util/* app/src/main/java/com/seal/app/util/ || true
          mv viewmodel/* app/src/main/java/com/seal/app/viewmodel/ || true
          mv MainActivity.kt app/src/main/java/com/seal/app/
          mv AndroidManifest.xml app/src/main/
          mv res/values/* app/src/main/res/values/ || true

      - name: Build with Gradle
        run: |
          chmod +x gradlew || gradle wrapper
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
